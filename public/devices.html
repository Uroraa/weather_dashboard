<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devices - ESP32 Sensor Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .device-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .device-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .device-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .api-key-box {
            background: #f7fafc;
            border: 1px dashed #cbd5e0;
            padding: 0.5rem;
            border-radius: 0.5rem;
            font-family: monospace;
            font-size: 0.875rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            word-break: break-all;
        }
        .btn-copy {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            padding: 0.2rem;
            margin-left: 0.5rem;
        }
        .device-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
            border-top: 1px solid #edf2f7;
            padding-top: 1rem;
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="ph-fill ph-cpu"></i>
                <span>IoT Monitor</span>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="ph ph-squares-four"></i>
<span>Dashboard</span>
</a>
                <a href="devices.html" class="nav-item active"><i class="ph ph-devices"></i>
<span>Devices</span>
</a>
                <a href="alerts.html" class="nav-item"><i class="ph ph-bell-ringing"></i>
<span>Alerts</span>
</a>
                <a href="forecast.html" class="nav-item"><i class="ph ph-cloud-sun"></i>
<span>Forecast</span>
</a>
                
                <a href="admin.html" class="nav-item admin-nav" id="admin-nav" style="display: none;"><i class="ph ph-shield-check"></i>
<span>Admin Portal</span>
</a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menu-toggle"><i class="ph ph-list"></i></button>
                    <h2 id="devices-page-header" style="font-size: 1.2rem; font-weight: 600; margin-left: 1rem;">My Devices</h2>
                </div>
                <div class="topbar-right">
                    <button class="btn btn-primary" onclick="openAddDeviceModal()"><i class="ph ph-plus"></i> Add Device</button>
                </div>
            </header>

            <main class="content">
                <div id="unauth-msg" style="display:none;" class="card">
                    <p class="text-danger"><i class="ph ph-warning-circle"></i> You must be logged in to manage your devices.</p>
                </div>

                <div id="devices-grid" class="metrics-grid" style="display:none; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));">
                    <!-- Devices injected here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Add Device Modal -->
    <div class="modal-overlay" id="add-device-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Device</h3>
                <button class="close-btn" onclick="closeModals()"><i class="ph ph-x"></i></button>
            </div>
            <form onsubmit="handleAddDevice(event)">
                <div class="form-group">
                    <label>Device Name</label>
                    <input type="text" id="new-dev-name" required placeholder="e.g. Living Room Sensor">
                </div>
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <textarea id="new-dev-desc" rows="3"></textarea>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-outline" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Device</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Settings Modal -->
    <div class="modal-overlay" id="edit-device-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Settings</h3>
                <button class="close-btn" onclick="closeModals()"><i class="ph ph-x"></i></button>
            </div>
            <form id="edit-dev-form" onsubmit="handleEditDevice(event)">
                <input type="hidden" id="edit-dev-id">
                
                <h4 style="margin-bottom: 0.5rem;">Alert Thresholds</h4>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Temp High (°C)</label>
                        <input type="number" step="0.1" id="edit-temp-high" placeholder="e.g. 30">
                    </div>
                    <div class="form-group">
                        <label>Temp Low (°C)</label>
                        <input type="number" step="0.1" id="edit-temp-low">
                    </div>
                    <div class="form-group">
                        <label>Humidity High (%)</label>
                        <input type="number" step="1" id="edit-hum-high">
                    </div>
                    <div class="form-group">
                        <label>Humidity Low (%)</label>
                        <input type="number" step="1" id="edit-hum-low">
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                        <input type="checkbox" id="edit-email-notify" style="width: auto;">
                        Send me Email Alerts for this device
                    </label>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1.5rem;">
                    <button type="button" class="btn btn-outline" onclick="closeModals()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/assets/js/common.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const deviceTimers = {};

        function setDeviceOffline(id) {
            const badge = document.getElementById(`status-badge-${id}`);
            if (badge) {
                badge.innerText = 'Offline';
                badge.style.background = '#e2e8f0';
                badge.style.color = '#4a5568';
            }
        }

        function setDeviceOnline(id) {
            const badge = document.getElementById(`status-badge-${id}`);
            if (badge) {
                badge.innerText = 'Online';
                badge.style.background = '#c6f6d5';
                badge.style.color = '#22543d';
            }
            if(deviceTimers[id]) clearTimeout(deviceTimers[id]);
            deviceTimers[id] = setTimeout(() => setDeviceOffline(id), 60000);
        }

        let globalSocket = null;
        function initGlobalSocket() {
            if(!Auth.isAuthenticated()) return;
            globalSocket = io();
            globalSocket.on('connect', () => {
                globalSocket.emit('authenticate', Auth.getToken());
            });
            globalSocket.on('new_reading', (r) => {
                setDeviceOnline(r.device_id);
            });
        }

        function openAddDeviceModal() {
            if(!Auth.isAuthenticated()) return alert("Please log in first.");
            document.getElementById('add-device-modal').classList.add('active');
        }

        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
        }

        async function handleAddDevice(e) {
            e.preventDefault();
            try {
                const res = await apiFetch('/api/devices', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: document.getElementById('new-dev-name').value,
                        description: document.getElementById('new-dev-desc').value
                    })
                });
                if(!res.ok) throw new Error("Failed to add device");
                closeModals();
                loadMyDevices();
            } catch(err) {
                alert(err.message);
            }
        }

        async function deleteDevice(id) {
            if(!confirm("Are you sure you want to delete this device? This will erase all its history.")) return;
            try {
                const res = await apiFetch(`/api/devices/${id}`, { method: 'DELETE' });
                if(!res.ok) throw new Error("Delete failed");
                loadMyDevices();
            } catch(err) { alert(err.message); }
        }

        function openEditModal(btn) {
            const data = JSON.parse(btn.getAttribute('data-device'));
            document.getElementById('edit-dev-id').value = data.id;
            document.getElementById('edit-temp-high').value = data.temp_high || '';
            document.getElementById('edit-temp-low').value = data.temp_low || '';
            document.getElementById('edit-hum-high').value = data.hum_high || '';
            document.getElementById('edit-hum-low').value = data.hum_low || '';
            document.getElementById('edit-email-notify').checked = !!data.notify_email;
            document.getElementById('edit-device-modal').classList.add('active');
        }

        async function handleEditDevice(e) {
            e.preventDefault();
            const id = document.getElementById('edit-dev-id').value;
            const payload = {
                temp_high: document.getElementById('edit-temp-high').value || null,
                temp_low: document.getElementById('edit-temp-low').value || null,
                hum_high: document.getElementById('edit-hum-high').value || null,
                hum_low: document.getElementById('edit-hum-low').value || null,
                notify_email: document.getElementById('edit-email-notify').checked
            };

            try {
                const res = await apiFetch(`/api/devices/${id}`, {
                    method: 'PUT',
                    body: JSON.stringify(payload)
                });
                if(!res.ok) throw new Error("Update failed");
                closeModals();
                loadMyDevices();
            } catch(err) { alert(err.message); }
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert("API Key copied to clipboard!");
        }

        async function loadMyDevices() {
            if (!Auth.isAuthenticated()) {
                document.getElementById('unauth-msg').style.display = 'block';
                return;
            }

            try {
                const res = await apiFetch('/api/devices');
                if (!res.ok) throw new Error();
                const devices = await res.json();
                
                if (Auth.getUser().role === 'admin') {
                    document.getElementById('devices-page-header').innerText = 'Devices';
                }

                const grid = document.getElementById('devices-grid');
                grid.innerHTML = '';
                grid.style.display = 'grid';

                devices.forEach(d => {
                    const notifyBadge = d.notify_email ? `<span style="font-size: 0.75rem; background:#38a169; color:white; padding: 0.1rem 0.4rem; border-radius:1rem;">Email On</span>` : '';
                    const ownerBadge = (Auth.getUser().role === 'admin' && d.owner_name) ? `<span style="font-size: 0.75rem; color:#718096; margin-left: 0.5rem;">Owner: ${d.owner_name}</span>` : '';
                    
                    const isOnline = d.last_reading && (Date.now() - new Date(d.last_reading).getTime() < 60000);
                    const statusBadge = isOnline ? 
                        `<span id="status-badge-${d.id}" style="font-size: 0.75rem; background:#c6f6d5; color:#22543d; padding: 0.1rem 0.4rem; border-radius:1rem; margin-left: 0.5rem;">Online</span>` : 
                        `<span id="status-badge-${d.id}" style="font-size: 0.75rem; background:#e2e8f0; color:#4a5568; padding: 0.1rem 0.4rem; border-radius:1rem; margin-left: 0.5rem;">Offline</span>`;

                    grid.innerHTML += `
                        <div class="card device-card">
                            <div class="device-card-header">
                                <span class="device-title"><i class="ph ph-cpu"></i> ${d.name} ${notifyBadge} ${statusBadge} ${ownerBadge}</span>
                            </div>
                            <p style="color:var(--text-muted); font-size: 0.875rem;">${d.description || 'No description'}</p>
                            
                            <div style="margin-top: 0.5rem;">
                                <label style="font-size:0.75rem; text-transform:uppercase; color:var(--text-muted); font-weight:700;">API Key (Secret)</label>
                                <div class="api-key-box">
                                    <span>${d.api_key}</span>
                                    <button class="btn-copy" onclick="copyKey('${d.api_key}')" title="Copy Key"><i class="ph ph-copy"></i></button>
                                </div>
                            </div>

                            <div class="device-actions">
                                <a href="device.html?id=${d.id}" class="btn btn-outline" style="flex:1; justify-content:center; padding:0.4rem;"><i class="ph ph-chart-bar"></i>
<span>Details</span>
</a>
                                <button class="btn btn-outline" style="flex:1; padding:0.4rem;" data-device='${JSON.stringify(d).replace(/'/g, "&apos;")}' onclick="openEditModal(this)"><i class="ph ph-gear"></i> Settings</button>
                                <button class="btn btn-danger" style="padding:0.4rem;" onclick="deleteDevice('${d.id}')" title="Delete Device"><i class="ph ph-trash"></i></button>
                            </div>
                        </div>
                    `;
                    
                    // Resume decay timer for online devices
                    if(isOnline) {
                        const remaining = 60000 - (Date.now() - new Date(d.last_reading).getTime());
                        deviceTimers[d.id] = setTimeout(() => setDeviceOffline(d.id), remaining);
                    }
                });
            } catch (err) {
                console.error(err);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadMyDevices();
            initGlobalSocket();
        });
    </script>
</body>
</html>
