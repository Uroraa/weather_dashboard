<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Sensor Monitor</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        
        <!-- Sidebar Drawer -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="ph-fill ph-cpu"></i>
                <span>IoT Monitor</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <i class="ph ph-squares-four"></i>
<span>Dashboard
                </span>
</a>
                <a href="devices.html" class="nav-item">
                    <i class="ph ph-devices"></i>
<span>Devices
                </span>
</a>
                <a href="alerts.html" class="nav-item">
                    <i class="ph ph-bell-ringing"></i>
<span>Alerts
                </span>
</a>
                <a href="forecast.html" class="nav-item">
                    <i class="ph ph-cloud-sun"></i>
<span>Forecast
                </span>
</a>
                
                
                <a href="admin.html" class="nav-item admin-nav" id="admin-nav" style="display: none;">
                    <i class="ph ph-shield-check"></i>
<span>Admin Portal
                </span>
</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menu-toggle">
                        <i class="ph ph-list"></i>
                    </button>
                    <div class="status-indicator">
                        <span class="status-dot" id="global-status-dot"></span>
                        <span id="global-status-text">Connecting...</span>
                    </div>
                </div>
                
                <div class="topbar-right">
                    <div class="user-profile" id="user-profile-btn">
                        <div class="avatar" id="user-avatar" style="display:none;">U</div>
                        <span id="user-name">Guest</span>
                    </div>
                    
                </div>
            </header>

            <!-- Dashboard Content -->
            <main class="content">
                <div class="page-header">
                    <h1 class="page-title">Dashboard</h1>
                    
                    <div class="device-select-wrapper">
                        <label for="device-selector" style="margin:0;"><i class="ph ph-funnel"></i> View Device:</label>
                        <select id="device-selector" class="device-select">
                            <option value="">Loading devices...</option>
                        </select>
                    </div>
                </div>

                <div id="dashboard-content" style="display: none;">
                    <!-- Metrics Cards -->
                    <div class="metrics-grid">
                        <div class="card metric-card">
                            <div class="card-header">
                                <i class="ph ph-thermometer temp-icon"></i>
                                <span>Temperature</span>
                            </div>
                            <div class="metric-value-wrapper">
                                <span class="metric-value" id="temp-value">--</span>
                                <span class="metric-unit">°C</span>
                            </div>
                        </div>

                        <div class="card metric-card">
                            <div class="card-header">
                                <i class="ph ph-drop hum-icon"></i>
                                <span>Humidity</span>
                            </div>
                            <div class="metric-value-wrapper">
                                <span class="metric-value" id="hum-value">--</span>
                                <span class="metric-unit">%</span>
                            </div>
                        </div>
                    </div>

                    <!-- Chart Card -->
                    <div class="card">
                        <div class="card-header" style="margin-bottom: 1rem;">
                            <i class="ph ph-chart-line-up"></i>
                            <span>Real-time History (Last 30 Readings)</span>
                        </div>
                        <div class="chart-container">
                            <canvas id="sensorChart"></canvas>
                        </div>
                    </div>
                </div>
                
                <div id="no-device-msg" class="card" style="text-align: center; padding: 4rem 2rem;">
                    <i class="ph ph-plugs" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
                    <h2 style="margin-bottom: 0.5rem;">No Devices Configured</h2>
                    <p style="color: var(--text-muted); margin-bottom: 1.5rem;">There are no active devices broadcasting data right now.</p>
                </div>
            </main>
        </div>
    </div>

    <!-- Common Utilities -->
    <script src="/assets/js/common.js"></script>
    <!-- Dashboard Specific Logic -->
    <script src="script.js"></script>
</body>
</html>
