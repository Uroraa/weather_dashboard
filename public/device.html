<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Details - ESP32 Sensor Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .detail-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;}
        .device-info { color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem;}
        
        .tab-group { display: flex; border-bottom: 1px solid #edf2f7; margin-bottom: 1.5rem; gap: 2rem; }
        .tab { padding: 0.5rem 0; color: var(--text-muted); font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: var(--transition);}
        .tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header"><i class="ph-fill ph-cpu"></i><span>IoT Monitor</span></div>
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item"><i class="ph ph-squares-four"></i>
<span>Dashboard</span>
</a>
                <a href="devices.html" class="nav-item active"><i class="ph ph-devices"></i>
<span>Devices</span>
</a>
                <a href="alerts.html" class="nav-item"><i class="ph ph-bell-ringing"></i>
<span>Alerts</span>
</a>
                <a href="forecast.html" class="nav-item"><i class="ph ph-cloud-sun"></i>
<span>Forecast</span>
</a>
                
                <a href="admin.html" class="nav-item admin-nav" id="admin-nav" style="display: none;"><i class="ph ph-shield-check"></i>
<span>Admin Portal</span>
</a>
            </nav>
        </aside>

        <div class="main-wrapper">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle" id="menu-toggle"><i class="ph ph-list"></i></button>
                    <a href="devices.html" class="btn btn-outline" style="margin-left: 1rem; padding: 0.4rem 0.8rem;"><i class="ph ph-arrow-left"></i>
<span>Back</span>
</a>
                </div>
                <div class="topbar-right">
                    <div class="status-indicator">
                        <span class="status-dot" id="dev-status-dot"></span>
                        <span id="dev-status-text">Connecting...</span>
                    </div>
                </div>
            </header>

            <main class="content">
                <div id="loading" style="text-align:center; padding: 4rem; color:var(--text-muted);">Loading...</div>

                <div id="device-content" style="display:none;">
                    <div class="detail-header">
                        <div>
                            <h1 class="page-title" id="dev-name" style="margin:0;">--</h1>
                            <div class="device-info">
                                <span id="dev-desc"></span> • 
                                Created: <span id="dev-created"></span>
                            </div>
                        </div>
                    </div>

                    <div class="metrics-grid">
                        <div class="card metric-card">
                            <div class="card-header"><i class="ph ph-thermometer temp-icon"></i><span>Latest Temp</span></div>
                            <div class="metric-value-wrapper"><span class="metric-value" id="val-temp">--</span><span class="metric-unit">°C</span></div>
                        </div>
                        <div class="card metric-card">
                            <div class="card-header"><i class="ph ph-drop hum-icon"></i><span>Latest Humidity</span></div>
                            <div class="metric-value-wrapper"><span class="metric-value" id="val-hum">--</span><span class="metric-unit">%</span></div>
                        </div>
                    </div>

                    <div class="card" style="margin-bottom: 2rem;">
                        <div class="tab-group">
                            <div class="tab active" onclick="switchTab('chart')">Live Chart</div>
                            <div class="tab" onclick="switchTab('history')">History Table</div>
                            <div class="tab" onclick="switchTab('alerts')">Alerts</div>
                        </div>

                        <div id="tab-chart" class="tab-content active">
                            <div class="chart-container"><canvas id="devChart"></canvas></div>
                        </div>

                        <div id="tab-history" class="tab-content">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                                <div>
                                    <label style="font-size:0.875rem;">Rows: </label>
                                    <select onchange="changeHistPageSize(this.value)" style="padding:0.25rem;">
                                        <option value="10">10</option>
                                        <option value="25">25</option>
                                        <option value="50">50</option>
                                    </select>
                                </div>
                                <button class="btn btn-outline" onclick="exportCSV()"><i class="ph ph-download"></i> Export CSV</button>
                            </div>
                            <div class="table-wrapper">
                                <table>
                                    <thead><tr><th>Time</th><th>Temperature (°C)</th><th>Humidity (%)</th></tr></thead>
                                    <tbody id="history-tbody"></tbody>
                                </table>
                            </div>
                            <div id="history-pagination" style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1rem; align-items:center;"></div>
                        </div>

                        <div id="tab-alerts" class="tab-content">
                            <div style="display:flex; justify-content:flex-end; margin-bottom:1rem;">
                                <div>
                                    <label style="font-size:0.875rem;">Rows: </label>
                                    <select onchange="changeAlertsPageSize(this.value)" style="padding:0.25rem;">
                                        <option value="5">5</option>
                                        <option value="10">10</option>
                                        <option value="15">15</option>
                                    </select>
                                </div>
                            </div>
                            <div id="alerts-tbody"></div>
                            <div id="alerts-pagination" style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1rem; align-items:center;"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/assets/js/common.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('id');
        let socket, devChart, historyData = [];
        let allAlerts = [];
        
        let histPage = 1;
        let histPageSize = 10;
        
        let alertsPage = 1;
        let alertsPageSize = 5;

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            if(tab === 'alerts') loadAlerts();
        }

        function initChart() {
            const ctx = document.getElementById('devChart').getContext('2d');
            devChart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [
                    { label: 'Temp', data: [], borderColor: '#e53e3e', yAxisID: 'y', tension:0.4 },
                    { label: 'Hum', data: [], borderColor: '#3182ce', yAxisID: 'y1', tension:0.4 }
                ]},
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { type: 'linear', position: 'left' }, y1: { type: 'linear', position: 'right', grid: {drawOnChartArea: false} } }
                }
            });
        }

        async function loadDevice() {
            try {
                const res = await apiFetch(`/api/devices/${deviceId}`);
                if(!res.ok) {
                    document.getElementById('loading').innerText = 'Device not found or access denied';
                    return;
                }
                const device = await res.json();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('device-content').style.display = 'block';
                
                document.getElementById('dev-name').innerText = device.name;
                document.getElementById('dev-desc').innerText = device.description || 'No description';
                document.getElementById('dev-created').innerText = new Date(device.created_at).toLocaleDateString();

                await loadReadings();
                setupSocket();
            } catch(e) { console.error(e); }
        }

        async function loadReadings() {
            try {
                const res = await apiFetch(`/api/devices/${deviceId}/readings?limit=100`);
                if(res.ok) {
                    historyData = await res.json();
                    renderChart();
                    renderHistoryTable();
                    
                    if(historyData.length > 0) {
                        const latest = historyData[historyData.length-1];
                        document.getElementById('val-temp').innerText = latest.temperature;
                        document.getElementById('val-hum').innerText = latest.humidity;
                    }
                }
            } catch(e) {}
        }

        function renderChart() {
            const dataToChart = historyData.slice(-30);
            devChart.data.labels = dataToChart.map(d => new Date(d.timestamp).toLocaleTimeString());
            devChart.data.datasets[0].data = dataToChart.map(d => d.temperature);
            devChart.data.datasets[1].data = dataToChart.map(d => d.humidity);
            devChart.update();
        }

        function renderHistoryTable() {
            const tbody = document.getElementById('history-tbody');
            const sortedData = [...historyData].reverse();
            
            const start = (histPage - 1) * histPageSize;
            const paginated = sortedData.slice(start, start + histPageSize);
            
            tbody.innerHTML = paginated.map(d => `
                <tr>
                    <td>${new Date(d.timestamp).toLocaleString()}</td>
                    <td><span class="text-danger">${d.temperature}</span></td>
                    <td><span class="text-primary" style="color:#3182ce;">${d.humidity}</span></td>
                </tr>
            `).join('');

            const totalPages = Math.ceil(sortedData.length / histPageSize);
            document.getElementById('history-pagination').innerHTML = `
                <button class="btn btn-outline" style="padding:0.2rem 0.5rem; font-size:0.875rem;" ${histPage <= 1 ? 'disabled' : ''} onclick="changeHistPage(-1)">Prev</button>
                <span style="font-size:0.875rem; color:var(--text-muted); white-space:nowrap;">Page ${histPage} of ${totalPages || 1}</span>
                <button class="btn btn-outline" style="padding:0.2rem 0.5rem; font-size:0.875rem;" ${histPage >= totalPages ? 'disabled' : ''} onclick="changeHistPage(1)">Next</button>
            `;
        }

        window.changeHistPageSize = function(size) {
            histPageSize = parseInt(size, 10);
            histPage = 1;
            renderHistoryTable();
        };

        window.changeHistPage = function(dir) {
            histPage += dir;
            renderHistoryTable();
        };

        async function loadAlerts() {
            try {
                const res = await apiFetch(`/api/alerts/device/${deviceId}`);
                if(res.ok) {
                    allAlerts = await res.json();
                    renderAlertsTable();
                }
            } catch(e) {}
        }

        function renderAlertsTable() {
            const container = document.getElementById('alerts-tbody');
            if(allAlerts.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted); padding:1rem;">No alerts for this device.</p>';
                return;
            }

            const start = (alertsPage - 1) * alertsPageSize;
            const paginated = allAlerts.slice(start, start + alertsPageSize);

            container.innerHTML = paginated.map(a => `
                <div style="padding:1rem; border-bottom:1px solid #edf2f7; display:flex; justify-content:space-between;">
                    <div>
                        <div style="font-weight:600; margin-bottom:0.25rem;">${a.type.toUpperCase()}</div>
                        <div style="color:var(--text-muted); font-size:0.875rem;">${a.message}</div>
                    </div>
                    <div style="font-size:0.75rem; color:#a0aec0;">${new Date(a.timestamp).toLocaleString()}</div>
                </div>
            `).join('');

            const totalPages = Math.ceil(allAlerts.length / alertsPageSize);
            document.getElementById('alerts-pagination').innerHTML = `
                <button class="btn btn-outline" style="padding:0.2rem 0.5rem; font-size:0.875rem;" ${alertsPage <= 1 ? 'disabled' : ''} onclick="changeAlertsPage(-1)">Prev</button>
                <span style="font-size:0.875rem; color:var(--text-muted); white-space:nowrap;">Page ${alertsPage} of ${totalPages || 1}</span>
                <button class="btn btn-outline" style="padding:0.2rem 0.5rem; font-size:0.875rem;" ${alertsPage >= totalPages ? 'disabled' : ''} onclick="changeAlertsPage(1)">Next</button>
            `;
        }

        window.changeAlertsPageSize = function(size) {
            alertsPageSize = parseInt(size, 10);
            alertsPage = 1;
            renderAlertsTable();
        };

        window.changeAlertsPage = function(dir) {
            alertsPage += dir;
            renderAlertsTable();
        };

        function exportCSV() {
            let csv = 'Timestamp,Temperature,Humidity\n';
            historyData.forEach(r => {
                csv += `${new Date(r.timestamp).toISOString()},${r.temperature},${r.humidity}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `device_${deviceId}_data.csv`;
            a.click();
        }

        function setupSocket() {
            socket = io();
            socket.on('connect', () => {
                document.getElementById('dev-status-dot').classList.add('live');
                document.getElementById('dev-status-text').innerText = 'Live connected';
                socket.emit('subscribe_device', deviceId);
            });
            socket.on('disconnect', () => {
                document.getElementById('dev-status-dot').classList.remove('live');
                document.getElementById('dev-status-text').innerText = 'Disconnected';
            });
            socket.on('new_reading', (r) => {
                document.getElementById('val-temp').innerText = r.temperature;
                document.getElementById('val-hum').innerText = r.humidity;
                
                historyData.push(r);
                if(historyData.length > 100) historyData.shift();
                
                renderChart();
                renderHistoryTable();
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(!deviceId) {
                document.getElementById('loading').innerText = 'No Device ID provided';
                return;
            }
            initChart();
            loadDevice();
        });
    </script>
</body>
</html>
