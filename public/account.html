<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Management - ESP32 Sensor Monitor</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .account-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        @media (max-width: 900px) {
            .account-grid { grid-template-columns: 1fr; }
        }
        
        .list-item {
            padding: 1.25rem 0;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item:last-child { border-bottom: none; padding-bottom: 0; }
        .list-item:first-child { padding-top: 0; }
        
        .item-meta { display: flex; flex-direction: column; gap: 0.25rem; }
        .item-title { font-weight: 600; color: var(--text-main); }
        .item-subtitle { font-size: 0.875rem; color: var(--text-muted); }
        
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e0;
            transition: .4s;
            border-radius: 34px;
        }
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .toggle-slider { background-color: var(--success-color); }
        input:checked + .toggle-slider:before { transform: translateX(20px); }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Main Content -->
        <div class="main-wrapper" style="margin-left: 0; width: 100%;">
            <header class="topbar">
                <div class="topbar-left">
                    <a href="index.html" style="display:flex; align-items:center; gap:0.5rem; text-decoration:none; color:var(--primary-color); font-weight:700; font-size:1.2rem;">
                        <i class="ph-fill ph-cpu" style="font-size:1.5rem;"></i>
                        <span>IoT Monitor</span>
                    </a>
                </div>
                
                <div class="topbar-right">
                    <!-- Dropdown structure injected by common.js -->
                </div>
            </header>

            <main class="content">
                <div class="page-header">
                    <h1 class="page-title">Account Management</h1>
                </div>

                <div class="account-grid">
                    <!-- Left Column -->
                    <div style="display:flex; flex-direction:column; gap:2rem;">
                        
                        <!-- Profile Card -->
                        <div class="card">
                            <div class="card-header" style="margin-bottom:1.5rem;">
                                <i class="ph ph-user"></i>
                                <span>Profile Information</span>
                            </div>
                            <div id="profile-alert" class="alert-box alert-success" style="display:none; background:#c6f6d5; color:#22543d; border-color:#9ae6b4; padding:0.75rem; border-radius:0.5rem; margin-bottom:1rem;"></div>
                            <form id="profile-form">
                                <div class="form-group">
                                    <label>Email Address</label>
                                    <input type="email" id="acc-email" required title="Update your registered email">
                                </div>
                                <div class="form-group">
                                    <label>Full Name</label>
                                    <input type="text" id="acc-name" required>
                                </div>
                                <button type="submit" class="btn btn-primary mt-2">Save Profile</button>
                            </form>
                        </div>

                        <!-- Security Card -->
                        <div class="card">
                            <div class="card-header" style="margin-bottom:1.5rem;">
                                <i class="ph ph-lock-key"></i>
                                <span>Security</span>
                            </div>
                            <div id="security-alert" class="alert-box" style="display:none; padding:0.75rem; border-radius:0.5rem; margin-bottom:1rem;"></div>
                            <form id="security-form">
                                <div class="form-group">
                                    <label>Current Password</label>
                                    <input type="password" id="acc-old-pwd" required>
                                </div>
                                <div class="form-group">
                                    <label>New Password</label>
                                    <input type="password" id="acc-new-pwd" required minlength="6">
                                </div>
                                <div class="form-group">
                                    <label>Confirm Password</label>
                                    <input type="password" id="acc-conf-pwd" required minlength="6">
                                </div>
                                <button type="submit" class="btn btn-primary mt-2">Update Password</button>
                            </form>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div style="display:flex; flex-direction:column; gap:2rem;">
                        
                        <!-- Devices Card -->
                        <div class="card">
                            <div class="card-header" style="margin-bottom:1.5rem;">
                                <i class="ph ph-devices"></i>
                                <span>My Devices</span>
                            </div>
                            <p style="color:var(--text-muted); margin-bottom:1rem; font-size:0.875rem;">Manage your active sensor hardware components.</p>
                            
                            <div id="acc-devices-list" style="margin-bottom: 1.5rem;">
                                <div style="text-align:center; padding:1rem; color:var(--text-muted);">Loading devices...</div>
                            </div>
                            
                            <div style="border-top:1px solid #edf2f7; padding-top:1.5rem;">
                                <h4 style="margin-bottom:1rem; font-size:1rem;">Add New Device</h4>
                                <div id="add-device-alert" class="alert-box alert-error" style="display:none; padding:0.75rem; border-radius:0.5rem; margin-bottom:1rem;"></div>
                                <form id="add-device-form" style="display:flex; gap:1rem; align-items:flex-end;">
                                    <div class="form-group" style="margin-bottom:0; flex:1;">
                                        <label style="font-size:0.875rem;">Device Name</label>
                                        <input type="text" id="new-dev-name" required placeholder="Living Room Sensor">
                                    </div>
                                    <button type="submit" class="btn btn-primary" style="height:42px;"><i class="ph ph-plus"></i> Add</button>
                                </form>
                            </div>
                        </div>

                        <!-- Notifications & API Keys -->
                        <div class="card">
                            <div class="card-header" style="margin-bottom:1.5rem;">
                                <i class="ph ph-bell-ringing"></i>
                                <span>Device Options</span>
                            </div>
                            <p style="color:var(--text-muted); margin-bottom:1rem; font-size:0.875rem;">Toggle email alerts per device and view API Keys.</p>
                            
                            <div id="notification-toggles">
                                <div style="text-align:center; padding:1rem; color:var(--text-muted);">Loading settings...</div>
                            </div>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals for Devices inline editing -->
    <div class="modal-overlay" id="rename-device-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Rename Device</h3>
                <button class="close-btn" onclick="document.getElementById('rename-device-modal').classList.remove('active')">&times;</button>
            </div>
            <form id="rename-device-form">
                <input type="hidden" id="rename-dev-id">
                <div class="form-group">
                    <label>New Name</label>
                    <input type="text" id="rename-dev-name" required>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem;">
                    <button type="button" class="btn btn-outline" onclick="document.getElementById('rename-device-modal').classList.remove('active')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Rename</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Common Utilities -->
    <script src="/assets/js/common.js"></script>
    <!-- Account Logic -->
    <script src="/assets/js/account.js"></script>
</body>
</html>
